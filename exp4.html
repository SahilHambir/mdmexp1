<!DOCTYPE html> 
<html> 
<body> 
<input id="task"> 
<button onclick="add()">Add</button > 
<ul id="list"></ul> 
<script> 
function add(){ 
let t=document.getElementById("task").value; 
let items=document.getElementsByTagName("li"); 
for(let i=0;i<items.length;i++) 
if(items[i].firstChild.textContent.trim()==t){alert("Duplicate Task");return;} 
let li=document.createElement("li"); 
li.innerHTML=t+" <button onclick='done(this)'>Done</button> <button onclick='del(this)'>X</button>"; 
document.getElementById("list").appendChild(li); 
} 
function done(x){x.parentElement.style.textDecoration="line-through";} 
function del(x){x.parentElement.remove();} 
</script> 
</body> 
</html>
