<!DOCTYPE html>
<html>
<body>

<h2>Student Records</h2>

<button onclick="show()">Get Data</button>

<table border="1" id="tb">
<tr>
<th>Name</th>
<th>Title</th>
<th>Total</th>
<th>Remark</th>
</tr>
</table>

<script>
function show()
{
 fetch("http://172.16.5.154:4000/api/getAll/harshawar")
 .then(res => res.json())
 .then(data => {

   for(let i=0; i<data.length; i++)
   {
     document.getElementById("tb").innerHTML +=
     "<tr><td>" + data[i].Name +
     "</td><td>" + data[i].Title +
     "</td><td>" + data[i].Total +
     "</td><td>" + data[i].Remark +
     "</td></tr>";
   }

 });
}
</script>

</body>
</html>
