<!DOCTYPE html>
<html>
<body>

<select id="city" onchange="showCity()">
  <option>Choose</option>
  <option>Mumbai</option>
  <option>Pune</option>
</select>

<p id="result"></p>

<script>
function showCity() {
  var c = document.getElementById("city").value;
  document.getElementById("result").innerHTML = "Selected: " + c;
}
</script>

</body>
</html>
